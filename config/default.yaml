session:
  timezone: "America/New_York"
  brinks_start: "09:00"
  brinks_end: "10:00"
  trade_window_start: "10:00"
  trade_window_end: "12:00"
  asian_session_start: "00:00"
  asian_session_end: "08:00"
  weekdays_only: true

vectors:
  lookback: 20
  primary_threshold: 2.0
  secondary_threshold: 1.5
  body_fraction_min: 0.45
  max_external_age_bars: 24
  timeframes:
    - "1m"
    - "5m"
    - "15m"
  primary_timeframe: "5m"

trade_logic:
  allow_reversal: true
  allow_continuation: true
  allow_momentum_entry: true
  require_mid_hold: true
  use_ema_filter: true
  ema_fast: 13
  ema_slow: 50
  track_all_internal_vectors: true

risk:
  stop_mode: "opposite_box_side"
  atr_length: 14
  atr_multiplier: 1.2
  rr_target: 1.5
  buffer_ticks: 2
  one_trade_per_day: true
  flatten_after_window: true
  time_at_entry_max_bars: 10

news:
  enabled: true
  blackout_minutes_before: 15
  blackout_minutes_after: 15
  impact_levels:
    - "high"

backtest:
  initial_capital: 10000.0
  commission_pct: 0.04
  default_symbol: "SPY"
  min_trades_wanted: 50

live:
  broker: "alpaca"
  paper_trading: true
  symbol: "SPY"
  position_size_mode: "fixed_shares"
  fixed_shares: 100
  max_equity_pct: 0.10
